<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VILN Ranking</title>
<style>
  :root{
    --bg:#070a07;
    --panel:#0d120d;
    --panel-2:#111811;
    --line:rgba(140,211,46,.16);
    --line-hi:rgba(140,211,46,.34);
    --toxic:#8CD32E;
    --toxic-hi:#C6F160;
    --ink:#EDE8FA;
    --ink-dim:rgba(237,232,250,.5);
    --ink-faint:rgba(237,232,250,.32);
    --up:#8CD32E;
    --down:#ff5470;
    --mono:"SFMono-Regular",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace;
    --sans:"Arial Black","Arial Narrow Bold",system-ui,sans-serif;
    --body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  .wrap{max-width:960px;margin:0 auto;padding:clamp(14px,3vw,26px)}

  /* ── Header ── */
  .head{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:16px;flex-wrap:wrap;margin-bottom:16px;
    border-bottom:1px solid var(--line);padding-bottom:14px;
  }
  .title{display:flex;align-items:center;gap:11px}
  .title .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--toxic);box-shadow:0 0 10px var(--toxic);
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .title h1{
    margin:0;font-family:var(--sans);
    font-size:clamp(17px,3vw,24px);letter-spacing:.16em;color:var(--ink);
  }
  .title h1 span{color:var(--toxic)}
  .refresh-box{display:flex;align-items:center;gap:12px}
  .countdown{
    font-family:var(--mono);font-size:12px;color:var(--ink-dim);
    letter-spacing:.04em;
  }
  .countdown b{color:var(--toxic);font-variant-numeric:tabular-nums}
  .btn-refresh{
    font-family:var(--sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-dim);background:transparent;
    border:1px solid var(--line-hi);border-radius:7px;
    padding:7px 13px;cursor:pointer;transition:.18s;
    display:inline-flex;align-items:center;gap:7px;
  }
  .btn-refresh:hover{color:var(--toxic);border-color:var(--toxic);box-shadow:0 0 14px rgba(140,211,46,.18)}
  .btn-refresh.spin .ic{animation:spin .8s linear infinite}
  .ic{display:inline-block;line-height:1}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── Tabs ── */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tab{
    flex:1 1 auto;min-width:0;
    font-family:var(--sans);font-size:clamp(10px,1.6vw,12px);letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-dim);background:var(--panel);
    border:1px solid var(--line);border-radius:9px;
    padding:11px 8px;cursor:pointer;transition:.16s;text-align:center;
    position:relative;overflow:hidden;
  }
  .tab small{display:block;font-family:var(--body);font-size:9px;letter-spacing:.02em;
    text-transform:none;color:var(--ink-faint);margin-top:3px;font-weight:400}
  .tab:hover{border-color:var(--line-hi);color:var(--ink)}
  .tab.active{
    color:#0a0d0a;background:var(--toxic);border-color:var(--toxic);
    box-shadow:0 0 18px rgba(140,211,46,.28);
  }
  .tab.active small{color:rgba(10,13,10,.7)}

  /* ── Search ── */
  .searchrow{position:relative;margin-bottom:14px}
  .search{
    width:100%;font-family:var(--body);font-size:13px;color:var(--ink);
    background:var(--panel);border:1px solid var(--line);border-radius:9px;
    padding:11px 13px 11px 36px;outline:none;transition:.16s;
  }
  .search::placeholder{color:var(--ink-faint)}
  .search:focus{border-color:var(--line-hi);box-shadow:0 0 0 3px rgba(140,211,46,.08)}
  .searchrow .mag{
    position:absolute;left:12px;top:50%;transform:translateY(-50%);
    color:var(--ink-faint);font-size:14px;pointer-events:none;
  }

  /* ── Table ── */
  .table-wrap{
    background:var(--panel);border:1px solid var(--line);
    border-radius:12px;overflow:hidden;
  }
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{
    font-family:var(--sans);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink-faint);text-align:right;font-weight:400;
    padding:11px 12px;border-bottom:1px solid var(--line);
    background:var(--panel-2);position:sticky;top:0;
  }
  thead th.l{text-align:left}
  thead th.sortable{cursor:pointer;user-select:none;transition:color .14s}
  thead th.sortable:hover{color:var(--ink)}
  thead th.sort-asc::after{content:" ▲";font-size:8px;color:var(--toxic)}
  thead th.sort-desc::after{content:" ▼";font-size:8px;color:var(--toxic)}
  tbody tr{
    border-bottom:1px solid rgba(140,211,46,.06);
    cursor:pointer;transition:background .14s;
  }
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(140,211,46,.05)}
  td{padding:11px 12px;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  td.l{text-align:left}

  .rank{font-family:var(--mono);color:var(--ink-faint);font-size:12px;width:34px}
  .rank.top{color:var(--toxic);font-weight:700}

  .tok{display:flex;align-items:center;gap:9px;min-width:0}
  .tok-ic{
    width:26px;height:26px;border-radius:50%;flex:none;
    background:var(--panel-2);border:1px solid var(--line);
    object-fit:cover;
  }
  .tok-txt{min-width:0;line-height:1.25}
  .tok-sym{font-family:var(--sans);font-size:12px;letter-spacing:.03em;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px}
  .tok-name{font-size:10px;color:var(--ink-faint);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px}

  /* trust badge + wash warning */
  .trust{font-size:8px;margin-right:5px;vertical-align:middle;line-height:1;cursor:help}
  .trust-hi{color:#8CD32E;text-shadow:0 0 6px rgba(140,211,46,.5)}
  .trust-mid{color:#e2b93b}
  .trust-lo{color:#ff5470}
  .wash{color:#e2b93b;font-size:11px;margin-left:5px;cursor:help;vertical-align:middle}
  .bmap{font-size:11px;margin-left:6px;text-decoration:none;opacity:.4;
    vertical-align:middle;transition:opacity .15s;cursor:pointer}
  .bmap:hover{opacity:1}

  .score{font-family:var(--mono);color:var(--toxic);font-weight:700}
  .num{font-family:var(--mono);color:var(--ink-dim)}
  .chg{font-family:var(--mono);font-weight:600}
  .chg.up{color:var(--up)}
  .chg.down{color:var(--down)}

  /* rank change flash */
  @keyframes flashUp{0%{background:rgba(140,211,46,.28)}100%{background:transparent}}
  @keyframes flashDown{0%{background:rgba(255,84,112,.24)}100%{background:transparent}}
  tr.flash-up{animation:flashUp 1.6s ease-out}
  tr.flash-down{animation:flashDown 1.6s ease-out}

  /* states */
  .state{padding:44px 20px;text-align:center;color:var(--ink-dim);font-size:13px}
  .state .big{font-family:var(--sans);font-size:14px;letter-spacing:.1em;color:var(--ink);margin-bottom:8px;text-transform:uppercase}
  .state.err .big{color:var(--down)}
  .state button{
    margin-top:14px;font-family:var(--sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--toxic);background:transparent;border:1px solid var(--toxic);
    border-radius:7px;padding:9px 18px;cursor:pointer;transition:.16s;
  }
  .state button:hover{background:rgba(140,211,46,.12)}
  .skel{padding:0}
  .skel-row{height:48px;border-bottom:1px solid rgba(140,211,46,.05);
    background:linear-gradient(90deg,transparent,rgba(140,211,46,.05),transparent);
    background-size:200% 100%;animation:shim 1.3s infinite}
  @keyframes shim{to{background-position:-200% 0}}

  .foot{
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
    margin-top:14px;font-size:11px;color:var(--ink-faint);
    font-family:var(--mono);letter-spacing:.02em;
  }
  .foot a{color:var(--ink-dim);text-decoration:none}
  .foot a:hover{color:var(--toxic)}

  .legend{
    display:flex;flex-wrap:wrap;gap:14px;align-items:center;
    margin-top:12px;font-size:10px;color:var(--ink-faint);
    font-family:var(--mono);letter-spacing:.03em;
  }
  .legend .trust,.legend .wash{margin:0 3px 0 0}

  /* progressive column hiding as the screen narrows */
  @media (max-width:820px){
    .col-5m{display:none}
  }
  @media (max-width:680px){
    .col-mcap,.col-1h{display:none}
  }
  @media (max-width:560px){
    .col-liq,.col-vol{display:none}
    td,thead th{padding:10px 8px}
    .tok-sym,.tok-name{max-width:108px}
    .bmap{display:none}
    .tok-ic{width:22px;height:22px}
  }
  @media (max-width:380px){
    .tab small{display:none}
    .tok-sym,.tok-name{max-width:88px}
    td,thead th{padding:9px 6px}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <div class="title">
      <span class="dot"></span>
      <h1>VILN<span>·</span>RANKING</h1>
    </div>
    <div class="refresh-box">
      <span class="countdown">next in <b id="cd">30</b>s</span>
      <button class="btn-refresh" id="refreshBtn"><span class="ic">↻</span> Refresh</button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="score">🔥 Trending<small>VILN Score</small></button>
    <button class="tab" data-tab="fresh">🆕 New Gems<small>Fresh + Boosted</small></button>
    <button class="tab" data-tab="active">📈 Volume<small>Most Traded</small></button>
    <button class="tab" data-tab="surge">🚀 Pumping<small>24h Gainers</small></button>
  </div>

  <div class="searchrow">
    <span class="mag">⌕</span>
    <input class="search" id="search" type="text" placeholder="Filter by symbol or name…" autocomplete="off" spellcheck="false">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:34px">#</th>
          <th class="l">Token</th>
          <th id="th-score" class="sortable" data-sort="metric">Score</th>
          <th class="sortable col-mcap" data-sort="mcap">MCap</th>
          <th class="sortable col-liq" data-sort="liq">Liquidity</th>
          <th class="sortable col-vol" data-sort="vol">Vol 24h</th>
          <th class="sortable col-5m" data-sort="chg5m">5m</th>
          <th class="sortable col-1h" data-sort="chg1h">1h</th>
          <th class="sortable" data-sort="chg">24h</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="legend">
    <span class="trust trust-hi">●</span> Solid
    <span class="trust trust-mid">●</span> Caution
    <span class="trust trust-lo">●</span> Risky
    <span class="wash">⚠</span> Possible wash trading
  </div>
  <div class="foot">
    <span id="status">Loading…</span>
    <span>Data: <a href="https://dexscreener.com" target="_blank" rel="noopener">DexScreener</a> · Solana</span>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ─────────────────────────────────────────────
  // Config
  // ─────────────────────────────────────────────
  var REFRESH_SEC = 30;
  var TOP_N = 50;
  // Weights for the overall VILN Score
  var W = { vol:0.35, liq:0.25, mom:0.20, part:0.20 };

  // ── Trust filters ──────────────────────────────────────────
  // Tokens below these floors are dropped as dust / dead / rug-prone.
  var MIN_LIQ = 10000;    // $10K minimum pool liquidity
  var MIN_VOL = 5000;     // $5K minimum 24h volume
  var MIN_TX  = 30;       // at least 30 trades in 24h (alive)
  // Dead-pool guard: if 24h volume is under this fraction of liquidity, the pool
  // is parked money with almost no trading — drop it (e.g. BILLY: $6K vol / $840K liq).
  var MIN_VOL_LIQ = 0.03; // volume must be ≥ 3% of liquidity
  // New Gems tab only shows tokens younger than this (days). Older boosted coins
  // won't leak into "New" just because they paid for boosts.
  var MAX_FRESH_DAYS = 7;
  // Wash-trading suspicion: volume/liquidity ratio above this looks inflated.
  var WASH_RATIO = 40;    // volume/liquidity above this is suspicious...
  var WASH_CHG = 8;       // ...but only if price barely moved (±8%). Real pumps get a pass.

  // Seed tokens to pull. DexScreener's public search/pairs endpoints are keyless.
  // We search a few Solana-relevant terms and merge unique pairs.
  var SEARCH_TERMS = [
    // core solana memes
    "BONK","WIF","POPCAT","MEW","GIGA","MOODENG","PNUT","VILN","FARTCOIN","AI16Z",
    "GOAT","CHILLGUY","ACT","PENGU","TRUMP","BODEN","MICHI","BOME","SLERF","MYRO",
    "WEN","RETARDIO","BILLY","DADDY","LOCKIN","HARAMBE","SPX","MOTHER","GME","FWOG",
    // pump.fun graduates / recent runners
    "pump.fun","LUCE","ZEREBRO","CHILLHOUSE","SIGMA","GNON","URO","RIF","ARC","SNAI",
    "AVA","BUTTHOLE","STONKS","VINE","AURA","SWARMS","TANK","GRIFFAIN","ELIZA","DEGENAI"
  ];
  var CHAIN = "solana";
  // Symbols to exclude from the board (majors / infra tokens, case-insensitive)
  // Symbols to exclude (case-insensitive) — keep the board pure memecoins.
  var EXCLUDE = [
    // majors / infra
    "SOL","WSOL","PUMP","JUP","RAY","JLP","JTO","ORCA","PYTH","W","DRIFT",
    "KMNO","CLOUD","MPLX","TNSR","RENDER","RNDR","HNT","MOBILE","IOT","IO",
    "GRASS","ZEUS","METEORA","MET",
    // stablecoins / wrapped / liquid-staking
    "USDC","USDT","USDS","PYUSD","USDH","UXD","EURC","DAI","FDUSD",
    "MSOL","JITOSOL","BSOL","STSOL","INF","HSOL","BNSOL","JUPSOL","CBBTC",
    "WBTC","WETH","BTC","ETH","ZBTC",
    // bridged impostors from other chains
    "XRP","DOGE","SHIB","PEPE","ADA","LINK","AVAX","MATIC","BNB","TRX",
    "LTC","DOT","UNI","ATOM","NEAR","APT","SUI","TON","FLOKI","BABYDOGE"
  ];

  // ─────────────────────────────────────────────
  // State
  // ─────────────────────────────────────────────
  var current = "score";
  var query = "";
  var sortKey = null;   // column-click override; null = use tab default
  var sortDir = -1;     // -1 desc, 1 asc
  var shownCount = 0;   // rows actually visible after tab/filter
  var lastRanks = {};      // { tabKey: { pairAddr: rankIndex } }
  var dataCache = [];      // last processed token list
  var timer = null, cd = REFRESH_SEC, cdTimer = null;
  var loading = false;

  var tbody = document.getElementById("tbody");
  var statusEl = document.getElementById("status");
  var cdEl = document.getElementById("cd");
  var thScore = document.getElementById("th-score");

  // ─────────────────────────────────────────────
  // Fetch + normalize
  // ─────────────────────────────────────────────
  function fetchTerm(term){
    var url = "https://api.dexscreener.com/latest/dex/search?q=" + encodeURIComponent(term);
    return fetch(url).then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.json();
    }).then(function(j){ return (j && j.pairs) ? j.pairs : []; })
      .catch(function(){ return []; });
  }

  // ── Boosted / trending source ──────────────────────────────
  // 1) pull boosted token lists (addresses only, no price data)
  // 2) resolve those addresses to full pair data via the search endpoint
  function fetchBoostList(url){
    return fetch(url).then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.json();
    }).then(function(arr){
      arr = Array.isArray(arr) ? arr : [];
      var out = [];
      arr.forEach(function(b){
        if(b && b.chainId === CHAIN && b.tokenAddress){
          out.push({ addr: b.tokenAddress, boost: num(b.amount) || num(b.totalAmount) || 1 });
        }
      });
      return out;
    }).catch(function(){ return []; });
  }

  function fetchPairsForTokens(addrs){
    // tokens/v1 accepts up to 30 comma-separated addresses per call.
    // This keeps the token count high (one call per 30) — priority is showing
    // as many tokens as possible; buy/sell bars render when txns are present.
    var chunks = [];
    for(var i=0;i<addrs.length;i+=30) chunks.push(addrs.slice(i,i+30));
    return chunks.reduce(function(chain, chunk){
      return chain.then(function(acc){
        var url = "https://api.dexscreener.com/tokens/v1/"+CHAIN+"/"+chunk.join(",");
        return fetch(url).then(function(r){
          return r.ok ? r.json() : [];
        }).then(function(arr){
          return acc.concat(Array.isArray(arr)?arr:[]);
        }).catch(function(){ return acc; })
          .then(function(a){
            return new Promise(function(res){ setTimeout(function(){res(a);}, 120); });
          });
      });
    }, Promise.resolve([]));
  }

  function loadBoosted(){
    // merge "top" (most active boosts) + "latest" (freshly boosted)
    return Promise.all([
      fetchBoostList("https://api.dexscreener.com/token-boosts/top/v1"),
      fetchBoostList("https://api.dexscreener.com/token-boosts/latest/v1")
    ]).then(function(res){
      var boostBy = {};
      res[0].concat(res[1]).forEach(function(b){
        if(!boostBy[b.addr] || b.boost > boostBy[b.addr]) boostBy[b.addr] = b.boost;
      });
      var addrs = Object.keys(boostBy);
      if(!addrs.length) return [];
      return fetchPairsForTokens(addrs).then(function(pairs){
        return pairs.map(function(p){
          var ta = p.baseToken && p.baseToken.address;
          if(ta && boostBy[ta]){ p.boosts = { active: boostBy[ta] }; }
          return p;
        });
      });
    }).catch(function(){ return []; });
  }

  function fetchInBatches(terms, size){
    var out = [];
    var chunks = [];
    for(var i=0;i<terms.length;i+=size) chunks.push(terms.slice(i,i+size));
    return chunks.reduce(function(chain, chunk){
      return chain.then(function(){
        return Promise.all(chunk.map(fetchTerm)).then(function(res){
          out = out.concat(res);
          return new Promise(function(r){ setTimeout(r, 120); }); // brief pause
        });
      });
    }, Promise.resolve()).then(function(){ return out; });
  }

  function loadAll(){
    return Promise.all([
      fetchInBatches(SEARCH_TERMS, 8),
      loadBoosted()
    ]).then(function(sources){
      // sources[0] = array of pair-arrays (from search)
      // sources[1] = flat array of pairs (from boosts/trending)
      var lists = sources[0].concat([ sources[1] ]);
      // Step 1 — collapse to one row per TOKEN address (sum flow across its pools).
      var byToken = {};
      lists.forEach(function(pairs){
        pairs.forEach(function(p){
          if(!p || p.chainId !== CHAIN) return;
          var tokenAddr = p.baseToken && p.baseToken.address;
          if(!tokenAddr) return;
          var sym = ((p.baseToken && p.baseToken.symbol) || "").toUpperCase();
          if(EXCLUDE.indexOf(sym) > -1) return;           // drop majors/infra
          var n = normalize(p);
          var cur = byToken[tokenAddr];
          if(!cur){
            byToken[tokenAddr] = n;
          } else {
            cur.vol += n.vol;
            cur.tx  += n.tx;
            if(n.boost > cur.boost) cur.boost = n.boost;
            if(n.createdAt && (!cur.createdAt || n.createdAt < cur.createdAt)) cur.createdAt = n.createdAt;
            if(n.liq > cur.liq){
              cur.liq = n.liq; cur.chg = n.chg; cur.price = n.price;
              cur.chg5m = n.chg5m; cur.chg1h = n.chg1h; cur.mcap = n.mcap;
              cur.url = n.url; cur.addr = n.addr;
              cur.img = n.img || cur.img;
            }
          }
        });
      });

      // Step 2 — collapse impostors: same SYMBOL, different address → keep the
      // deepest-liquidity one only (the real token), drop the copycats.
      var bySym = {};
      Object.keys(byToken).forEach(function(k){
        var t = byToken[k];
        var key = t.sym.toUpperCase();
        if(!bySym[key] || t.liq > bySym[key].liq){
          bySym[key] = t;
        }
      });

      // Step 3 — trust floors: drop dust / dead / rug-prone tokens.
      return Object.keys(bySym).map(function(k){ return bySym[k]; })
        .filter(function(t){
          return t.liq >= MIN_LIQ && t.vol >= MIN_VOL && t.tx >= MIN_TX
              && (t.liq <= 0 || t.vol / t.liq >= MIN_VOL_LIQ);
        });
    });
  }

  function normalize(p){
    var vol = num(p.volume && p.volume.h24);
    var liq = num(p.liquidity && p.liquidity.usd);
    var chg = num(p.priceChange && p.priceChange.h24);
    var chg5m = num(p.priceChange && p.priceChange.m5);
    var chg1h = num(p.priceChange && p.priceChange.h1);
    var tx  = p.txns && p.txns.h24 ? (num(p.txns.h24.buys)+num(p.txns.h24.sells)) : 0;
    var info = p.info || {};
    return {
      addr: p.pairAddress,
      tokenAddr: p.baseToken && p.baseToken.address,
      url: p.url || ("https://dexscreener.com/"+CHAIN+"/"+p.pairAddress),
      sym: (p.baseToken && p.baseToken.symbol) || "?",
      name: (p.baseToken && p.baseToken.name) || "",
      img: info.imageUrl || "",
      vol: vol, liq: liq, chg: chg, chg5m: chg5m, chg1h: chg1h, tx: tx,
      price: num(p.priceUsd),
      mcap: num(p.marketCap) || num(p.fdv),
      createdAt: num(p.pairCreatedAt),
      boost: (p.boosts && num(p.boosts.active)) || 0
    };
  }

  function num(v){ var n = parseFloat(v); return isFinite(n) ? n : 0; }

  // ─────────────────────────────────────────────
  // Scoring — absolute reference scale (stable across refreshes)
  // Each metric maps to 0..1 against a FIXED anchor, not the current set's max,
  // so a token's score doesn't swing just because the field changed.
  // ─────────────────────────────────────────────
  // Anchors: the value that counts as "excellent" (=> ~1.0) on a log scale.
  var ANCHOR = { vol: 5e6, liq: 2e6, tx: 5000, boost: 100 };
  // Trust badge uses a memecoin-scale liquidity anchor: ~$1M liq reads as "solid".
  var TRUST_LIQ_ANCHOR = 1e6;

  function scaleLog(v, anchor){ return clamp(ln(v)/ln(anchor), 0, 1); }

  // Liquidity → depth score (0..1), tuned to memecoin reality so tiers actually split:
  //   >= $1M  → 0.9-1.0 (rock solid)     $500K → ~0.8
  //   $100K   → ~0.5 (borderline)        $30K  → ~0.3 (thin)
  //   <= $10K → ~0.1 (dust)
  function trustDepth(liq){
    var pts = [[10000,0.10],[30000,0.30],[60000,0.42],[100000,0.52],
               [250000,0.66],[500000,0.80],[1000000,0.92],[3000000,1.0]];
    if(liq <= pts[0][0]) return 0.05;
    if(liq >= pts[pts.length-1][0]) return 1.0;
    for(var i=0;i<pts.length-1;i++){
      var a=pts[i], b=pts[i+1];
      if(liq >= a[0] && liq < b[0]){
        var f=(Math.log(liq)-Math.log(a[0]))/(Math.log(b[0])-Math.log(a[0]));
        return a[1] + f*(b[1]-a[1]);
      }
    }
    return 0.5;
  }

  function computeScores(list){
    var now = Date.now();
    list.forEach(function(t){
      // absolute log-scaled metrics (0..1)
      var volN = scaleLog(t.vol, ANCHOR.vol);
      var liqN = scaleLog(t.liq, ANCHOR.liq);
      var txN  = scaleLog(t.tx,  ANCHOR.tx);
      var momN = clamp((t.chg + 50) / 150, 0, 1);
      t.score = Math.round(
        (W.vol*volN + W.liq*liqN + W.mom*momN + W.part*txN) * 1000
      ) / 10;

      // ── Trust score (0..100): mostly liquidity DEPTH, some real activity ──
      // Depth is scored on a memecoin-scale anchor so shallow tokens actually
      // fall into mid/lo tiers instead of all riding activity up to green.
      t.washRatio = t.liq > 0 ? (t.vol / t.liq) : 999;
      t.wash = t.washRatio > WASH_RATIO && Math.abs(t.chg) < WASH_CHG;
      var depth = trustDepth(t.liq);                  // stricter liquidity curve
      var activity = scaleLog(t.tx, ANCHOR.tx);
      var washPenalty = t.wash ? 0.35 : 0;
      // depth dominates (0.75) so liquidity separates the tiers; activity is a minor lift
      t.trust = Math.round(clamp(0.75*depth + 0.25*activity - washPenalty, 0, 1) * 100);
      t.trustTier = t.trust >= 70 ? "hi" : (t.trust >= 40 ? "mid" : "lo");

      // ── FRESH score: freshness blended with trending (boost weight lowered) ──
      var ageMs = t.createdAt ? (now - t.createdAt) : Infinity;
      var ageDays = ageMs / 86400000;
      var freshN = isFinite(ageDays) ? clamp(1 - ageDays/7, 0, 1) : 0;
      var boostN = scaleLog(t.boost, ANCHOR.boost);
      // freshness 60% · real activity 20% · boost(paid ad) only 20%
      t.freshScore = Math.round((0.6*freshN + 0.2*activity + 0.2*boostN) * 1000) / 10;
      t.ageDays = ageDays;
    });
  }
  function ln(v){ return Math.log(1 + Math.max(0,v)); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  // ─────────────────────────────────────────────
  // Sorting per tab
  // ─────────────────────────────────────────────
  function sortFor(tab, list){
    var arr = list.slice();
    // New Gems: restrict to genuinely young tokens (age known and under the cap).
    if(tab==="fresh"){
      arr = arr.filter(function(t){ return isFinite(t.ageDays) && t.ageDays <= MAX_FRESH_DAYS; });
    }
    // Pumping: drop early-listing fake spikes — a huge % on a brand-new pair is
    // usually just price discovery, not a real pump. (< 2h old AND > 1000%.)
    if(tab==="surge"){
      arr = arr.filter(function(t){
        var tooYoung = isFinite(t.ageDays) && t.ageDays < (2/24);
        return !(tooYoung && t.chg > 1000);
      });
    }
    // Column-click override takes precedence over the tab's default sort.
    if(sortKey){
      var key = sortKey === "metric" ? metricKeyFor(tab) : sortKey;
      arr.sort(function(a,b){ return (num(a[key]) - num(b[key])) * sortDir; });
      return arr.slice(0, TOP_N);
    }
    if(tab==="score")  arr.sort(function(a,b){return b.score-a.score});
    if(tab==="active") arr.sort(function(a,b){return (b.vol+b.tx*10)-(a.vol+a.tx*10)});
    if(tab==="fresh")  arr.sort(function(a,b){return b.freshScore-a.freshScore});
    if(tab==="surge")  arr.sort(function(a,b){return b.chg-a.chg});
    return arr.slice(0, TOP_N);
  }
  // which underlying field the "Score/metric" column represents per tab
  function metricKeyFor(tab){
    return ({score:"score", active:"tx", fresh:"freshScore", surge:"chg"})[tab] || "score";
  }

  // ─────────────────────────────────────────────
  // Render
  // ─────────────────────────────────────────────
  function fmtUsd(v){
    if(v>=1e9) return "$"+(v/1e9).toFixed(2)+"B";
    if(v>=1e6) return "$"+(v/1e6).toFixed(2)+"M";
    if(v>=1e3) return "$"+(v/1e3).toFixed(1)+"K";
    if(v>0)    return "$"+v.toFixed(0);
    return "—";
  }
  function fmtChg(v){
    if(!isFinite(v)||v===0) return "0.0%";
    return (v>0?"+":"")+v.toFixed(1)+"%";
  }
  function fmtAge(days){
    if(!isFinite(days)) return "—";
    if(days < 1){ var h = Math.max(1, Math.round(days*24)); return h+"h"; }
    if(days < 30) return Math.round(days)+"d";
    return Math.round(days/30)+"mo";
  }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }

  function metricCell(tab, t){
    // primary metric shown in the "Score" column changes per tab
    if(tab==="score")  return '<td class="score">'+t.score.toFixed(1)+'</td>';
    if(tab==="active") return '<td class="num">'+ (t.tx>0? t.tx.toLocaleString():"—") +'</td>';
    if(tab==="fresh")  return '<td class="score">'+fmtAge(t.ageDays)+'</td>';
    if(tab==="surge")  return '<td class="chg '+(t.chg>=0?"up":"down")+'">'+fmtChg(t.chg)+'</td>';
    return '<td class="num">—</td>';
  }

  function render(){
    var list = sortFor(current, dataCache);
    // apply search
    if(query){
      var q = query.toLowerCase();
      list = list.filter(function(t){
        return t.sym.toLowerCase().indexOf(q)>-1 || t.name.toLowerCase().indexOf(q)>-1;
      });
    }

    // header label per tab
    thScore.textContent = ({score:"Score",active:"Txns 24h",fresh:"Age",surge:"24h"})[current];

    if(!list.length){
      tbody.innerHTML = '<tr><td colspan="9"><div class="state">'+
        '<div class="big">Nothing here</div>'+
        (query? 'No token matches "'+esc(query)+'". Clear the filter to see the full board.'
              : 'No data returned. Hit refresh to try again.')+
        '</div></td></tr>';
      return;
    }

    var prev = lastRanks[current] || {};
    var nextRanks = {};
    var rows = list.map(function(t, i){
      nextRanks[t.tokenAddr||t.addr] = i;
      var flash = "";
      if(prev[t.tokenAddr||t.addr] !== undefined){
        if(i < prev[t.tokenAddr||t.addr]) flash = "flash-up";
        else if(i > prev[t.tokenAddr||t.addr]) flash = "flash-down";
      }
      var rankCls = i<3 ? "rank top" : "rank";
      var icon = t.img
        ? '<img class="tok-ic" src="'+esc(t.img)+'" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">'
        : '<span class="tok-ic"></span>';
      var badge = '<span class="trust trust-'+t.trustTier+'" title="Trust '+t.trust+'/100 · liquidity depth + real activity">●</span>';
      var washTag = t.wash ? '<span class="wash" title="Volume is very high vs liquidity — possible wash trading">⚠</span>' : '';
      var bubbleLink = t.tokenAddr
        ? '<a class="bmap" href="https://app.bubblemaps.io/sol/token/'+esc(t.tokenAddr)+'" target="_blank" rel="noopener" title="View holder bubble map (Bubblemaps)">🫧</a>'
        : '';
      return '<tr class="'+flash+'" data-url="'+esc(t.url)+'">'+
        '<td class="'+rankCls+'">'+(i+1)+'</td>'+
        '<td class="l"><div class="tok">'+icon+
          '<div class="tok-txt"><div class="tok-sym">'+badge+esc(t.sym)+washTag+bubbleLink+'</div>'+
          '<div class="tok-name">'+esc(t.name)+'</div></div></div></td>'+
        metricCell(current, t)+
        '<td class="col-mcap num">'+fmtUsd(t.mcap)+'</td>'+
        '<td class="col-liq num">'+fmtUsd(t.liq)+'</td>'+
        '<td class="col-vol num">'+fmtUsd(t.vol)+'</td>'+
        '<td class="col-5m chg '+(t.chg5m>=0?"up":"down")+'">'+fmtChg(t.chg5m)+'</td>'+
        '<td class="col-1h chg '+(t.chg1h>=0?"up":"down")+'">'+fmtChg(t.chg1h)+'</td>'+
        '<td class="chg '+(t.chg>=0?"up":"down")+'">'+fmtChg(t.chg)+'</td>'+
      '</tr>';
    }).join("");

    tbody.innerHTML = rows;
    lastRanks[current] = nextRanks;
    shownCount = list.length;
    if(dataCache.length){
      statusEl.textContent = shownCount+" tokens · "+
        ({score:"Trending",fresh:"New Gems",active:"Volume",surge:"Pumping"})[current];
    }
  }

  function showSkeleton(){
    var rows = "";
    for(var i=0;i<10;i++) rows += '<tr><td colspan="9" class="skel"><div class="skel-row"></div></td></tr>';
    tbody.innerHTML = rows;
  }

  function showError(){
    tbody.innerHTML = '<tr><td colspan="9"><div class="state err">'+
      '<div class="big">Couldn\'t load the board</div>'+
      'DexScreener didn\'t respond. This is usually a network hiccup or a rate limit — give it a moment.'+
      '<br><button id="retry">Retry now</button></div></td></tr>';
    var r = document.getElementById("retry");
    if(r) r.addEventListener("click", function(){ refresh(true); });
  }

  // ─────────────────────────────────────────────
  // Refresh cycle
  // ─────────────────────────────────────────────
  function refresh(manual){
    if(loading) return;
    loading = true;
    var btn = document.getElementById("refreshBtn");
    btn.classList.add("spin");
    if(!dataCache.length) showSkeleton();
    statusEl.textContent = "Fetching live pairs…";

    loadAll().then(function(list){
      if(!list.length) throw new Error("empty");
      computeScores(list);
      dataCache = list;
      render();
      var now = new Date();
      statusEl.textContent = shownCount+" tokens · updated "+
        now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit"});
    }).catch(function(){
      if(!dataCache.length) showError();
      statusEl.textContent = "Update failed — showing last data";
    }).then(function(){
      loading = false;
      btn.classList.remove("spin");
      resetCountdown();
    });
  }

  function resetCountdown(){
    cd = REFRESH_SEC;
    cdEl.textContent = cd;
  }

  function tick(){
    cd--;
    if(cd<=0){ refresh(false); return; }
    cdEl.textContent = cd;
  }

  // ─────────────────────────────────────────────
  // Events
  // ─────────────────────────────────────────────
  document.getElementById("tabs").addEventListener("click", function(e){
    var b = e.target.closest(".tab");
    if(!b) return;
    document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
    b.classList.add("active");
    current = b.getAttribute("data-tab");
    sortKey = null;   // switching tabs returns to that tab's default sort
    updateSortIndicators();
    render();
  });

  // Column-header click sorting
  var thead = document.querySelector("thead");
  if(thead){
    thead.addEventListener("click", function(e){
      var th = e.target.closest("th.sortable");
      if(!th) return;
      var key = th.getAttribute("data-sort");
      if(sortKey === key){ sortDir = -sortDir; }   // toggle direction
      else { sortKey = key; sortDir = -1; }         // new column, default desc
      updateSortIndicators();
      render();
    });
  }
  function updateSortIndicators(){
    document.querySelectorAll("th.sortable").forEach(function(th){
      th.classList.remove("sort-asc","sort-desc");
      if(sortKey && th.getAttribute("data-sort") === sortKey){
        th.classList.add(sortDir === -1 ? "sort-desc" : "sort-asc");
      }
    });
  }

  document.getElementById("search").addEventListener("input", function(e){
    query = e.target.value.trim();
    render();
  });

  document.getElementById("refreshBtn").addEventListener("click", function(){
    refresh(true);
  });

  tbody.addEventListener("click", function(e){
    // clicking the bubble-map link should open Bubblemaps, not DexScreener
    if(e.target.closest("a.bmap")) return;
    var tr = e.target.closest("tr[data-url]");
    if(!tr) return;
    var url = tr.getAttribute("data-url");
    if(url) window.open(url, "_blank", "noopener");
  });

  // ─────────────────────────────────────────────
  // Boot
  // ─────────────────────────────────────────────
  refresh(true);
  cdTimer = setInterval(tick, 1000);
})();
</script>
</body>
</html>
